name: Deploy

on:
  push:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  verify:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity minimal

  # ── API → GHCR ────────────────────────────────────────────────────────────
  build-and-push:
    name: API → GHCR
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/task-orchestrator-api
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS ─────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Encode compose file for transfer
        run: echo "COMPOSE_B64=$(base64 -w0 docker-compose.yml)" >> $GITHUB_ENV

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
            SHA_SHORT=$(echo '${{ github.sha }}' | cut -c1-7)
            IMAGE="ghcr.io/${OWNER}/task-orchestrator-api:${SHA_SHORT}"
            cd /opt/taskorchestrator
            # Write a clean compose file from the repo (fixes the corrupted
            # postgres image from the previous broad sed-all-image-lines approach)
            echo '${{ env.COMPOSE_B64 }}' | base64 -d > docker-compose.yml
            # Replace the placeholder with the real image tag
            sed -i "s|TASK_ORCHESTRATOR_API_IMAGE|${IMAGE}|" docker-compose.yml
            # Pull new image and start the full stack
            docker pull "$IMAGE"
            docker compose up -d
            # Reconnect API to coolify network for Traefik routing
            sleep 5
            docker network connect coolify taskorchestrator-api 2>/dev/null || true
            # Cleanup old images
            docker image prune -f

  # ── Client → Vercel ────────────────────────────────────────────────────────
  deploy-client:
    name: Client → Vercel
    runs-on: ubuntu-latest
    needs: verify
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Write production appsettings
        run: |
          cat > src/TaskOrchestrator.Client/wwwroot/appsettings.json << 'EOF'
          {"ApiBaseUrl":"${{ secrets.PRODUCTION_API_URL }}","Auth0":{"Authority":"https://dev-1a2cx08ksfvxqxy0.us.auth0.com","ClientId":"PySo12BvRscr3yWK0eG3aY5DQZyx9TFs","Audience":"https://api.taskorchestrator.io","Scope":"openid profile email","MetadataUrl":"https://dev-1a2cx08ksfvxqxy0.us.auth0.com/.well-known/openid-configuration","DefaultScopes":["openid","profile","email"]}}
          EOF

      - name: Publish client
        run: dotnet publish src/TaskOrchestrator.Client/TaskOrchestrator.Client.csproj -c Release -o published

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          cd published/wwwroot
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prod --token="$VERCEL_TOKEN" --yes
