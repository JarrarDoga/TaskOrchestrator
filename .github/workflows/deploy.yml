name: Deploy

on:
  push:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  # ── Client → Vercel ────────────────────────────────────────────────────────
  deploy-client:
    name: Client → Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Write production appsettings
        run: |
          cat > src/TaskOrchestrator.Client/wwwroot/appsettings.json << 'EOF'
          {
            "ApiBaseUrl": "https://taskorchestrator.jdoga.works",
            "Auth0": {
              "Authority": "https://dev-1a2cx08ksfvxqxy0.us.auth0.com",
              "ClientId": "PySo12BvRscr3yWK0eG3aY5DQZyx9TFs",
              "Audience": "https://api.taskorchestrator.io",
              "Scope": "openid profile email",
              "MetadataUrl": "https://dev-1a2cx08ksfvxqxy0.us.auth0.com/.well-known/openid-configuration",
              "DefaultScopes": [ "openid", "profile", "email" ]
            }
          }
          EOF

      - name: Publish client
        run: |
          dotnet publish src/TaskOrchestrator.Client/TaskOrchestrator.Client.csproj \
            -c Release -o published

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd published/wwwroot
          rm -rf .vercel
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prod --token="$VERCEL_TOKEN" --yes

  # ── API → GHCR ────────────────────────────────────────────────────────────
  build-and-push:
    name: API → GHCR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/task-orchestrator-api
          tags: |
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS ─────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository_owner }}/task-orchestrator-api:${{ github.sha }}"
            docker pull "$IMAGE"
            cd /opt/taskorchestrator
            docker compose down
            # Update the docker-compose.yml to use the GHCR image tag
            sed -i "s|image: mcr.microsoft.com/dotnet/aspnet:10.0#|image: ${IMAGE}|" docker-compose.yml 2>/dev/null || true
            # Remove build section if present (not needed with pre-built image)
            docker compose --file <(sed '/build:/,/dockerfile:/d' docker-compose.yml) up -d
            docker image prune -f
