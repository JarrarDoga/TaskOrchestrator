name: PR Auto-Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Build, Test, and Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build --no-restore -c Release

      - name: Run Tests
        run: dotnet test --no-build -c Release

      - name: Post summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = '### PR Review\n- Build: passed\n- Tests: passed\n\nPlease review the diff for quality and merge when ready.';
            github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body });
