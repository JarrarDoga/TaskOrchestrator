name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  BUILD_CONFIG: Release

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity warning

      - name: Analyze code (code-style enforcement)
        run: dotnet build --no-restore -c ${{ env.BUILD_CONFIG }} /p:EnforceCodeStyleInBuild=true /warnaserror:false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore --verbosity minimal

      - name: Build (Release)
        run: dotnet build --no-restore -c ${{ env.BUILD_CONFIG }} --verbosity minimal

      - name: Publish (validation)
        run: dotnet publish src/TaskOrchestrator.Api/TaskOrchestrator.Api.csproj -c ${{ env.BUILD_CONFIG }} --no-restore --verbosity quiet

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore --verbosity minimal

      - name: Run tests
        run: dotnet test --no-restore -c ${{ env.BUILD_CONFIG }} --verbosity normal --logger:"trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          retention-days: 30

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: task-orchestrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker image inspect "task-orchestrator:${{ github.sha }}" --format '{{.Config.Entrypoint}}'
