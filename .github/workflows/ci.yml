name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  BUILD_CONFIG: Release

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check formatting and lint
        run: dotnet build --no-restore -c ${{ env.BUILD_CONFIG }} /p:EnforceCodeStyleInBuild=true --verbosity minimal

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore --verbosity minimal

      - name: Build (Release)
        run: dotnet build --no-restore -c ${{ env.BUILD_CONFIG }} --verbosity minimal

      - name: Publish (validation)
        run: dotnet publish src/TaskOrchestrator.Api/TaskOrchestrator.Api.csproj -c ${{ env.BUILD_CONFIG }} --no-restore --verbosity quiet

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore --verbosity minimal

      - name: Run tests
        run: dotnet test --no-restore -c ${{ env.BUILD_CONFIG }} --verbosity normal --logger:"trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          retention-days: 30

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Build Docker image (validation)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: task-orchestrator:ci-test
          cache-from: type=gha

      - name: Verify image
        run: docker image inspect "task-orchestrator:ci-test" --format '{{.Config.Entrypoint}}'

      - name: Image details
        run: |
          IMAGE_SIZE=$(docker image inspect "task-orchestrator:ci-test" --format '{{.Size}}')
          echo "Image size: $(( IMAGE_SIZE / 1024 / 1024 )) MB"
