<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Orchestrator</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <!-- Tailwind CSS (CDN for local dev — swap for compiled output in production) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TaskOrchestrator.Client.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body class="bg-gray-100 text-gray-900">
    <div id="app">
        <div class="flex h-screen items-center justify-center">
            <div class="text-center">
                <div class="mb-4 h-12 w-12 animate-spin rounded-full border-4 border-blue-500 border-t-transparent mx-auto"></div>
                <p class="text-gray-500">Loading Task Orchestrator...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="hidden fixed bottom-4 right-4 rounded bg-red-600 px-4 py-3 text-white shadow-lg">
        An unhandled error has occurred.
        <a href="." class="underline">Reload</a>
        <span class="dismiss cursor-pointer ml-2">✕</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
