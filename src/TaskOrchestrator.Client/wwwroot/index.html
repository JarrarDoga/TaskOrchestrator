<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Orchestrator</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { mono: ['JetBrains Mono', 'ui-monospace', 'monospace'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TaskOrchestrator.Client.styles.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="app">
        <div style="display:flex;height:100vh;align-items:center;justify-content:center;background:#09090b">
            <div style="text-align:center">
                <div style="font-family:monospace;font-size:11px;letter-spacing:0.15em;color:#3f3f46;text-transform:uppercase;margin-bottom:16px">
                    Task Orchestrator
                </div>
                <div style="width:24px;height:24px;border:2px solid #3b82f6;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto"></div>
            </div>
        </div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:1rem;right:1rem;background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;padding:0.75rem 1rem;border-radius:6px;font-size:12px;z-index:9999">
        An unhandled error occurred.
        <a href="." style="color:#f87171;margin-left:8px">Reload</a>
        <span class="dismiss" style="margin-left:8px;cursor:pointer;color:#9ca3af">✕</span>
    </div>

    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="js/interop.js"></script>
</body>
</html>
