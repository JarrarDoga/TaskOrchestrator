<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orchestrator</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#a3a6ff",
                        "primary-dim": "#6063ee",
                        "primary-container": "#9396ff",
                        "on-primary": "#0f00a4",
                        "on-primary-container": "#0a0081",
                        "background": "#070e1d",
                        "surface": "#070e1d",
                        "surface-dim": "#070e1d",
                        "surface-bright": "#212c43",
                        "surface-container-lowest": "#000000",
                        "surface-container-low": "#0b1323",
                        "surface-container": "#11192b",
                        "surface-container-high": "#161f33",
                        "surface-container-highest": "#1b263b",
                        "surface-variant": "#1b263b",
                        "on-surface": "#dfe5fa",
                        "on-surface-variant": "#a4abbf",
                        "on-background": "#dfe5fa",
                        "outline": "#6e7588",
                        "outline-variant": "#414859",
                        "secondary": "#69f6b8",
                        "secondary-container": "#006c49",
                        "on-secondary": "#005a3c",
                        "on-secondary-container": "#e1ffec",
                        "tertiary": "#ffb148",
                        "tertiary-container": "#f8a010",
                        "on-tertiary": "#573500",
                        "on-tertiary-container": "#4a2c00",
                        "error": "#ff6e84",
                        "error-container": "#a70138",
                        "on-error": "#490013",
                        "on-error-container": "#ffb2b9",
                        "inverse-surface": "#f9f9ff",
                        "inverse-on-surface": "#4e5566",
                        "inverse-primary": "#494bd7",
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TaskOrchestrator.Client.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #070e1d; color: #dfe5fa; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1b263b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #414859; }
        .glass-panel { background: rgba(27, 38, 59, 0.85); backdrop-filter: blur(20px); }
        .btn-gradient { background: linear-gradient(135deg, #a3a6ff 0%, #6063ee 100%); }
    </style>
</head>
<body class="bg-background text-on-background font-body">
    <div id="app">
        <div style="display:flex;height:100vh;align-items:center;justify-content:center;background:#070e1d">
            <div style="text-align:center">
                <div style="font-family:Manrope,sans-serif;font-size:11px;letter-spacing:0.15em;color:#414859;text-transform:uppercase;margin-bottom:16px">Orchestrator</div>
                <div style="width:24px;height:24px;border:2px solid #a3a6ff;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto"></div>
            </div>
        </div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:1rem;right:1rem;background:#a70138;border:1px solid #ff6e84;color:#ffb2b9;padding:0.75rem 1rem;border-radius:6px;font-size:12px;z-index:9999">
        An unhandled error occurred.
        <a href="." style="color:#ff6e84;margin-left:8px">Reload</a>
        <span class="dismiss" style="margin-left:8px;cursor:pointer;color:#a4abbf">✕</span>
    </div>

    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="js/interop.js"></script>
</body>
</html>
